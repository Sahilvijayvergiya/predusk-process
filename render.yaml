services:
  # Backend Web Service
  - type: web
    name: document-processing-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: document-processing-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-domain.onrender.com
    disk:
      name: document-processing-disk
      mountPath: /app/uploads
      sizeGB: 1

  # PostgreSQL Database
  - type: pserv
    name: document-processing-db
    databaseName: document_processor
    user: document_processor_user
    plan: free  # or paid tier based on usage

  # Optional: Redis for background tasks (if using Celery)
  - type: redis
    name: document-processing-redis
    ipAllowList: []  # Restrict access if needed
    plan: free  # or paid tier based on usage
